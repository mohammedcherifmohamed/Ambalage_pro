<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoxPro | Gestion des Commandes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0B1120; }
        .status-badge { @apply px-3 py-1 rounded-full text-xs font-semibold; }
        .toast-notify {
            position: fixed; bottom: 24px; right: 24px; z-index: 1000;
            background: #1F2937; backdrop-filter: blur(8px); color: white;
            padding: 12px 20px; border-radius: 40px; display: flex; align-items: center;
            gap: 12px; transform: translateX(400px); transition: transform 0.3s ease;
        }
        .toast-notify.show { transform: translateX(0); }
    </style>
</head>
<body class="text-gray-200">
    <div id="toast" class="toast-notify"><svg class="w-5 h-5 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span id="toastMsg">Notification</span></div>

    <div class="flex h-screen overflow-hidden">
        <aside class="w-72 bg-gray-900/80 backdrop-blur-sm border-r border-gray-800 flex flex-col fixed h-full z-30">
            <div class="p-6 border-b border-gray-800">
                <div class="text-2xl font-bold"><span class="text-orange-500">Box</span><span class="text-white">Pro</span> <span class="text-xs text-gray-400">Admin</span></div>
                <p class="text-xs text-gray-500 mt-1">Solutions d'emballage Algérie</p>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>Dashboard</a>
                <a href="products.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>Produits</a>
                <a href="orders.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-orange-600/20 text-orange-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>Commandes</a>
                <a href="clients.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>Clients</a>
                <a href="analytics.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>Analyses</a>
            </nav>
        </aside>

        <div class="flex-1 md:ml-72 overflow-y-auto">
            <nav class="sticky top-0 z-20 bg-gray-900/90 backdrop-blur-md border-b border-gray-800 px-6 py-4">
                <h1 class="text-xl font-semibold">Gestion des Commandes</h1>
            </nav>

            <div class="p-6">
                <!-- Stats Commandes -->
                <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8" id="orderStats"></div>

                <!-- Filtres -->
                <div class="bg-gray-800/50 rounded-2xl p-5 border border-gray-700 mb-6 flex flex-wrap gap-4">
                    <input type="text" id="searchOrder" placeholder="Rechercher commande..." class="bg-gray-700 rounded-lg px-4 py-2 text-sm flex-1">
                    <select id="statusFilter" class="bg-gray-700 rounded-lg px-4 py-2 text-sm">
                        <option value="all">Tous les statuts</option>
                        <option value="pending">En attente</option>
                        <option value="confirmed">Confirmée</option>
                        <option value="shipped">Expédiée</option>
                        <option value="delivered">Livrée</option>
                        <option value="cancelled">Annulée</option>
                    </select>
                    <input type="date" id="dateFilter" class="bg-gray-700 rounded-lg px-4 py-2 text-sm">
                </div>

                <!-- Timeline et Commandes -->
                <div class="grid lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 bg-gray-800/50 rounded-2xl border border-gray-700 overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead class="bg-gray-900/50 border-b border-gray-700">
                                    <tr><th class="p-4 text-left">ID</th><th class="p-4 text-left">Client</th><th class="p-4 text-left">Date</th><th class="p-4 text-left">Montant</th><th class="p-4 text-left">Statut</th><th class="p-4 text-left">Action</th></tr>
                                </thead>
                                <tbody id="ordersList"></tbody>
                            </table>
                        </div>
                    </div>
                    <div class="bg-gray-800/50 rounded-2xl p-5 border border-gray-700">
                        <h3 class="font-semibold mb-4">Évolution quotidienne</h3>
                        <canvas id="dailyOrdersChart" height="200"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let orders = [
            { id: "ORD-1001", client: "SARL Emballec DZ", date: "2025-05-05", amount: 12450, status: "delivered", items: 3 },
            { id: "ORD-1002", client: "EURL TechBox", date: "2025-05-04", amount: 8900, status: "shipped", items: 2 },
            { id: "ORD-1003", client: "Startup Ecom Express", date: "2025-05-05", amount: 2300, status: "confirmed", items: 1 },
            { id: "ORD-1004", client: "Mega Distribution", date: "2025-05-06", amount: 32100, status: "pending", items: 5 },
            { id: "ORD-1005", client: "Sarl Mode Algérie", date: "2025-04-20", amount: 1200, status: "cancelled", items: 1 },
            { id: "ORD-1006", client: "LogiPack DZ", date: "2025-05-06", amount: 5600, status: "pending", items: 2 },
            { id: "ORD-1007", client: "Electro Store", date: "2025-05-03", amount: 18700, status: "shipped", items: 4 }
        ];

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function updateOrderStats() {
            const totalOrders = orders.length;
            const totalRevenue = orders.reduce((sum, o) => sum + o.amount, 0);
            const pending = orders.filter(o => o.status === 'pending').length;
            const avgValue = totalRevenue / totalOrders;
            
            document.getElementById('orderStats').innerHTML = `
                <div class="bg-gray-800 rounded-2xl p-4 text-center"><div class="text-2xl font-bold">${totalOrders}</div><div class="text-gray-400 text-sm">Total commandes</div></div>
                <div class="bg-gray-800 rounded-2xl p-4 text-center"><div class="text-2xl font-bold">${(totalRevenue/1000).toFixed(0)}k DA</div><div class="text-gray-400 text-sm">Chiffre d'affaires</div></div>
                <div class="bg-gray-800 rounded-2xl p-4 text-center"><div class="text-2xl font-bold text-orange-400">${pending}</div><div class="text-gray-400 text-sm">En attente</div></div>
                <div class="bg-gray-800 rounded-2xl p-4 text-center"><div class="text-2xl font-bold">${Math.round(avgValue)} DA</div><div class="text-gray-400 text-sm">Panier moyen</div></div>
                <div class="bg-gray-800 rounded-2xl p-4 text-center"><div class="text-2xl font-bold">${orders.filter(o => o.status === 'delivered').length}</div><div class="text-gray-400 text-sm">Livrées</div></div>
            `;
        }

        function getStatusBadge(status) {
            const badges = { pending: 'bg-yellow-900 text-yellow-300', confirmed: 'bg-blue-900 text-blue-300', shipped: 'bg-purple-900 text-purple-300', delivered: 'bg-green-900 text-green-300', cancelled: 'bg-red-900 text-red-300' };
            const labels = { pending: 'En attente', confirmed: 'Confirmée', shipped: 'Expédiée', delivered: 'Livrée', cancelled: 'Annulée' };
            return `<span class="px-3 py-1 rounded-full text-xs font-semibold ${badges[status]}">${labels[status]}</span>`;
        }

        function renderOrders() {
            const search = document.getElementById('searchOrder').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;
            const date = document.getElementById('dateFilter').value;
            
            let filtered = orders.filter(o => {
                const matchSearch = o.id.toLowerCase().includes(search) || o.client.toLowerCase().includes(search);
                const matchStatus = status === 'all' || o.status === status;
                const matchDate = !date || o.date === date;
                return matchSearch && matchStatus && matchDate;
            });
            
            document.getElementById('ordersList').innerHTML = filtered.map(o => `
                <tr class="border-b border-gray-700 hover:bg-gray-700/30">
                    <td class="p-4 font-mono text-sm">${o.id}</td>
                    <td class="p-4">${o.client}</td>
                    <td class="p-4">${o.date}</td>
                    <td class="p-4 font-semibold">${o.amount.toLocaleString()} DA</td>
                    <td class="p-4">${getStatusBadge(o.status)}</td>
                    <td class="p-4">
                        <select onchange="updateStatus('${o.id}', this.value)" class="bg-gray-700 rounded px-2 py-1 text-xs">
                            <option ${o.status === 'pending' ? 'selected' : ''} value="pending">En attente</option>
                            <option ${o.status === 'confirmed' ? 'selected' : ''} value="confirmed">Confirmée</option>
                            <option ${o.status === 'shipped' ? 'selected' : ''} value="shipped">Expédiée</option>
                            <option ${o.status === 'delivered' ? 'selected' : ''} value="delivered">Livrée</option>
                            <option ${o.status === 'cancelled' ? 'selected' : ''} value="cancelled">Annulée</option>
                        </select>
                    </td>
                </tr>
            `).join('');
        }

        window.updateStatus = (id, newStatus) => {
            const order = orders.find(o => o.id === id);
            if (order) {
                order.status = newStatus;
                showToast(`Commande ${id} → ${newStatus}`);
                renderOrders();
                updateOrderStats();
            }
        };

        function initChart() {
            const dailyData = [12, 15, 18, 22, 25, 28, 24, 30, 35, 32, 38, 42, 45, 48, 52, 49, 55, 58, 62, 65, 68, 72, 70, 75, 78, 82, 85, 88, 90, 92];
            const ctx = document.getElementById('dailyOrdersChart').getContext('2d');
            new Chart(ctx, { type: 'line', data: { labels: Array(30).fill().map((_,i)=>`J${i+1}`), datasets: [{ label: 'Commandes', data: dailyData, borderColor: '#F97316', backgroundColor: 'rgba(249,115,22,0.1)', fill: true, tension: 0.4 }] }, options: { responsive: true } });
        }

        document.getElementById('searchOrder').addEventListener('input', renderOrders);
        document.getElementById('statusFilter').addEventListener('change', renderOrders);
        document.getElementById('dateFilter').addEventListener('change', renderOrders);

        updateOrderStats();
        renderOrders();
        initChart();
    </script>
</body>
</html>
